<!doctype html>
<html lang="pt-BR">
 <head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SpinFlow - Login</title>
  <link rel="stylesheet" href="./00-styles.css" />
 </head>
 <body>
  <main class="phone">
   <section class="screen login-screen">
    <div class="brand">
     <div class="mark">SF</div>
     <div>
      <h1>SpinFlow</h1>
      <p>Gestão de aulas de spinning</p>
     </div>
    </div>

    <div class="field">
     <label for="email">E-mail ou CPF</label>
     <input id="email" type="text" placeholder="Digite seu e-mail ou CPF" />
    </div>
    <div class="field">
     <label for="senha">Senha</label>
     <input id="senha" type="password" placeholder="Digite sua senha" />
    </div>

    <a class="link" href="./03-forgot-password.html">Esqueci minha senha</a>

    <div class="bottom">
     <a class="button" href="./08-profile-selection.html">Entrar</a>
    </div>
   </section>
  </main>
 </body>
</html>
