<!doctype html>
<html lang="pt-BR">
 <head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>Música</title><link rel="stylesheet" href="./00-styles.css" /></head>
 <body>
  <main class="phone">
   <header class="top"><a class="icon-btn" href="./21-teacher-dashboard.html">&lt;</a><strong>Música</strong><a class="icon-btn top-exit" href="./01-login.html">Sair</a></header>
   <section class="screen scroll">
    <div class="field">
     <label>Nome *</label>
     <input />
    </div>
    <div class="field">
     <label>Artista / Banda *</label>
     <div class="selection-panel">
      <div class="select-with-action">
       <select>
        <option>The Weeknd</option>
        <option>David Guetta feat. Sia</option>
        <option>Avicii</option>
        <option>Dua Lipa</option>
        <option>Macklemore & Ryan Lewis</option>
        <option>Eminem</option>
        <option>Calvin Harris</option>
        <option>Imagine Dragons</option>
       </select>
       <a class="new-record-btn" href="./38-repertoire-artist-form.html" title="Cadastrar novo artista ou banda">↗</a>
      </div>
      <div class="selected-list"><span>The Weeknd</span></div>
     </div>
    </div>
    <div class="field">
     <label>Categorias musicais *</label>
     <div class="selection-panel">
      <div class="panel-header">
       <strong>Disponíveis</strong>
       <a class="new-record-btn small" href="./39-repertoire-category-form.html" title="Cadastrar nova categoria musical">↗</a>
      </div>
      <div class="option-list">
       <label><input checked type="checkbox" /> Aquecimento</label>
       <label><input checked type="checkbox" /> Sprint</label>
       <label><input type="checkbox" /> Subida pesada</label>
       <label><input type="checkbox" /> Resistência</label>
       <label><input type="checkbox" /> Recuperação ativa</label>
      </div>
      <a class="panel-add-button" href="#">+ Adicionar selecionadas</a>
      <div class="selected-list"><span>Aquecimento</span><span>Sprint</span></div>
     </div>
    </div>
    <div class="field">
     <label>Vídeos de aula cadastrados</label>
     <div class="selection-panel">
      <div class="panel-header">
       <strong>Disponíveis</strong>
       <a class="new-record-btn small" href="./40-repertoire-video-form.html" title="Cadastrar novo vídeo de aula">↗</a>
      </div>
      <div class="option-list">
       <label><input checked type="checkbox" /> Spinning Performance - Sprint 30s</label>
       <label><input type="checkbox" /> Spinning Avançado - Subida em pé</label>
       <label><input type="checkbox" /> Spinning Iniciante - Ajuste de cadência</label>
       <label><input type="checkbox" /> Intervalado HIIT - 45/15</label>
      </div>
      <a class="panel-add-button" href="#">+ Adicionar selecionados</a>
      <div class="selected-list"><span>Sprint 30s</span></div>
     </div>
    </div>
    <div class="bottom"><a class="button" href="./21-teacher-dashboard.html">Salvar</a></div>
   </section>
  </main>
 </body>
</html>
