<!doctype html>
<html lang="pt-BR">
 <head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>Cadastro</title><link rel="stylesheet" href="./00-styles.css" /></head>
 <body>
  <main class="phone">
   <header class="top"><a class="icon-btn" href="./28-admin-list.html">&lt;</a><strong>Manter aluno</strong><a class="icon-btn top-exit" href="./01-login.html">Sair</a></header>
   <section class="screen scroll">
    <div class="field"><label>Nome *</label><input placeholder="Nome completo" /></div>
    <div class="field"><label>E-mail *</label><input placeholder="email@exemplo.com" /></div>
    <div class="field"><label>Data de nascimento *</label><input placeholder="dd/mm/aaaa" /></div>
    <div class="field"><label>Gênero *</label><select><option>Selecione</option></select></div>
    <div class="field"><label>Telefone</label><input placeholder="(11) 99999-9999" /></div>
    <div class="field"><label>URL da foto</label><input placeholder="https://exemplo.com/foto.jpg" /></div>
    <div class="field"><label>Observações</label><textarea></textarea></div>
    <div class="success-box">Ativo</div>
    <div class="bottom"><a class="button" href="./28-admin-list.html">Salvar</a></div>
   </section>
  </main>
 </body>
</html>
